<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙界公务员 - 在线阅读</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.8;
        }
        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #2c3e50;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        /* 章节列表 */
        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .chapter-item {
            background: #fff;
            padding: 0.875rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .chapter-item:hover {
            background: #3498db;
            color: #fff;
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.2);
        }
        .chapter-item.active {
            background: #2ecc71;
            color: #fff;
        }
        .chapter-num {
            font-size: 0.85rem;
            opacity: 0.7;
            min-width: 60px;
        }
        .chapter-item:hover .chapter-num,
        .chapter-item.active .chapter-num {
            opacity: 1;
        }
        
        /* 阅读器 */
        .reader {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .reader.active { display: block; }
        .reader-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .reader-meta {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }
        .reader-content {
            font-size: 1.1rem;
            line-height: 2;
            text-align: justify;
        }
        .reader-content p {
            margin-bottom: 1.5rem;
            text-indent: 2em;
        }
        
        /* 导航按钮 */
        .reader-nav {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }
        .nav-btn {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }
        .nav-btn-primary {
            background: #3498db;
            color: #fff;
        }
        .nav-btn-primary:hover { background: #2980b9; }
        .nav-btn-secondary {
            background: #ecf0f1;
            color: #333;
        }
        .nav-btn-secondary:hover { background: #bdc3c7; }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .back-btn {
            background: #ecf0f1;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .back-btn:hover { background: #bdc3c7; }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .reader { padding: 1.5rem; }
            .chapter-item { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
            .chapter-num { font-size: 0.75rem; }
            .reader-nav { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 onclick="showList()">📖 修仙界公务员</h1>
    </header>
    
    <div class="container">
        <!-- 章节列表 -->
        <div id="chapterList">
            <h2 style="margin-top: 2rem;">目录</h2>
            <div class="chapter-list" id="chapters"></div>
        </div>
        
        <!-- 阅读器 -->
        <div class="reader" id="reader">
            <button class="back-btn" onclick="showList()">← 返回目录</button>
            <h1 class="reader-title" id="readerTitle"></h1>
            <div class="reader-meta" id="readerMeta"></div>
            <div class="reader-content" id="readerContent"></div>
            <div class="reader-nav">
                <button class="nav-btn nav-btn-secondary" id="prevBtn" onclick="prevChapter()">上一章</button>
                <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="nextChapter()">下一章</button>
            </div>
        </div>
    </div>

    <script>
        const CHAPTERS = [
            { num: 1, title: '加班猝死，穿越成仙', file: '00-前三章合集.md' },
            { num: 2, title: '第一卷大纲', file: '00-第一卷大纲.md' },
            { num: 3, title: '加班猝死穿越成仙', file: '01-加班猝死穿越成仙.md' },
            { num: 4, title: '第一天上班', file: '02-第一天上班.md' },
            { num: 5, title: '仙帝来渡劫', file: '03-仙帝来渡劫.md' },
            { num: 6, title: '加急费', file: '04-加急费.md' },
            { num: 7, title: '第一次加班', file: '05-第一次加班.md' },
            { num: 8, title: '造假案', file: '06-造假案.md' },
            { num: 9, title: '树敌', file: '07-树敌.md' },
            { num: 10, title: '人情世故', file: '08-人情世故.md' },
            { num: 11, title: '刘大伟的挑战', file: '09-刘大伟的挑战.md' },
            { num: 12, title: '第一次升职', file: '10-第一次升职.md' },
            { num: 13, title: '关系户', file: '11-关系户.md' },
            { num: 14, title: '苏媚儿登场', file: '12-苏媚儿登场.md' },
            { num: 15, title: '功德考核', file: '13-功德考核.md' },
            { num: 16, title: '林清雪来访', file: '14-林清雪来访.md' },
            { num: 17, title: '第一次聚会', file: '15-第一次聚会.md' },
            { num: 18, title: '功法审核漏洞', file: '16-功法审核漏洞.md' },
            { num: 19, title: '监察司来人', file: '17-监察司来人.md' },
            { num: 20, title: '王富贵的秘密', file: '18-王富贵的秘密.md' },
            { num: 21, title: '刘大伟服软', file: '19-刘大伟服软.md' },
            { num: 22, title: '第一次外勤', file: '20-第一次外勤.md' },
            { num: 23, title: '钱通神的注意', file: '21-钱通神的注意.md' },
            { num: 24, title: '张小美的秘密', file: '22-张小美的秘密.md' },
            { num: 25, title: '陈老实被欺负', file: '23-陈老实被欺负.md' },
            { num: 26, title: '第一次收礼', file: '24-第一次收礼.md' },
            { num: 27, title: '年度考核', file: '25-年度考核.md' },
            { num: 28, title: '晋升考核', file: '26-晋升考核.md' },
            { num: 29, title: '有人搞事', file: '27-有人搞事.md' },
            { num: 30, title: '自证清白', file: '28-自证清白.md' },
            { num: 31, title: '钱通神的警告', file: '29-钱通神的警告.md' },
            { num: 32, title: '第一卷尾声', file: '30-第一卷尾声.md' }
        ];
        let currentIndex = -1;

        function loadChapters() {
            const container = document.getElementById('chapters');
            container.innerHTML = CHAPTERS.map((c, i) => `
                <div class="chapter-item" onclick="loadChapter(${i})">
                    <span class="chapter-num">第${c.num}章</span>
                    <span class="chapter-title">${c.title}</span>
                </div>
            `).join('');
        }

        async function loadChapter(index) {
            if (index < 0 || index >= CHAPTERS.length) return;
            currentIndex = index;
            const chapter = CHAPTERS[index];
            
            document.getElementById('chapterList').style.display = 'none';
            document.getElementById('reader').classList.add('active');
            
            document.getElementById('readerTitle').textContent = `第${chapter.num}章 ${chapter.title}`;
            document.getElementById('readerMeta').textContent = `修仙界公务员 · 第一卷`;
            
            try {
                const res = await fetch(`第一卷/${chapter.file}`);
                if (!res.ok) throw new Error('File not found');
                const text = await res.text();
                // 移除 Markdown 标题行（以# 开头的行）
                const content = text.split('\n')
                    .filter(line => !line.startsWith('#') && line.trim())
                    .map(p => `<p>${p}</p>`)
                    .join('\n');
                document.getElementById('readerContent').innerHTML = content || '<p>内容为空</p>';
            } catch (e) {
                document.getElementById('readerContent').innerHTML = '<p>加载失败，请检查文件路径</p>';
            }
            
            updateNav();
            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('chapterList').style.display = 'block';
            document.getElementById('reader').classList.remove('active');
        }

        function updateNav() {
            document.getElementById('prevBtn').disabled = currentIndex <= 0;
            document.getElementById('nextBtn').disabled = currentIndex >= CHAPTERS.length - 1;
        }

        function prevChapter() {
            if (currentIndex > 0) loadChapter(currentIndex - 1);
        }

        function nextChapter() {
            if (currentIndex < CHAPTERS.length - 1) loadChapter(currentIndex + 1);
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('reader').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevChapter();
                if (e.key === 'ArrowRight') nextChapter();
                if (e.key === 'Escape') showList();
            }
        });

        loadChapters();
    </script>
</body>
</html>
